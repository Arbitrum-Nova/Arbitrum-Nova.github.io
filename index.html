<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arbitrum Nova</title>
  <meta name="description" content="Arbitrum Nova is a low-cost Ethereum L2 chain for apps and gaming, accessed from your own wallet.">
  <link rel="canonical" href="https://arbitrum-nova.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F8FA">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Arbitrum Nova">
  <meta property="og:description" content="Arbitrum Nova is a low-cost Ethereum L2 chain for apps and gaming, accessed from your own wallet.">
  <meta property="og:url" content="https://arbitrum-nova.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Arbitrum Nova">
  <meta name="twitter:description" content="Arbitrum Nova is a low-cost Ethereum L2 chain for apps and gaming, accessed from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://arbitrum-nova.github.io/#website",
        "url": "https://arbitrum-nova.github.io/",
        "name": "Arbitrum Nova",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://arbitrum-nova.github.io/#organization",
        "name": "Arbitrum",
        "url": "https://arbitrum.io/",
        "sameAs": ["https://arbitrum.io/"]
      },
      {
        "@type": "WebApplication",
        "@id": "https://arbitrum-nova.github.io/#app",
        "name": "Arbitrum Nova",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://arbitrum-nova.github.io/"
      }
    ]
  }
  </script>

  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
</head>
<body>
  <header class="topbar">
    <div class="brand" aria-label="Arbitrum Nova">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>Arbitrum Nova</span>
    </div>
    <nav class="nav" aria-label="Authority references">
      <a href="https://nova.arbiscan.io/" target="_blank" rel="nofollow noopener noreferrer">Explorer</a>
      <a href="https://arbitrum.io/" target="_blank" rel="nofollow noopener noreferrer">Official site</a>
      <a href="https://l2beat.com/scaling/summary" target="_blank" rel="nofollow noopener noreferrer">L2BEAT</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="Arbitrum Nova">
      <h1>Arbitrum Nova</h1>
      <p class="sub"><strong>Arbitrum Nova</strong> is a low-cost Ethereum L2 chain for apps and gaming, accessed from your own wallet.</p>
    </section>

    <section class="card" aria-label="Bridge route">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img src="eth.png" width="28" height="28" alt="Ethereum">
            <span>Ethereum</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch direction">
          <span aria-hidden="true">&#8594;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img src="arb.png" width="28" height="28" alt="Arbitrum Nova">
            <span>Arbitrum Nova</span>
          </span>
        </div>
      </div>
      <a class="primary" href="dashboard/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
    </section>
  </main>

  <footer class="foot">Arbitrum Nova — 2026</footer>

  <script>
  (function(){
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;
    button.addEventListener("click", function(){
      var chips = document.querySelectorAll(".chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  })();
  </script>
</body>
</html>
